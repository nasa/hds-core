# ci.yml
# PR gate -- runs on every pull request to main.
# Jobs are path-filtered so only relevant checks run for each PR.
# Chromatic only runs if compiled CSS hash differs from base branch.
#
# Action tags will be converted to SHA pins automatically by Dependabot
# on its first run. Do not manually replace tags with SHAs -- let
# Dependabot maintain them so updates are tracked via PR.
#
# Artifact strategy: the build job uploads all of dist/ as a single
# artifact. Jobs that need dist/ (bundle-size, css-hash, api-check,
# test, chromatic) download it instead of rebuilding. build-storybook
# is the exception -- it also triggers on mdx/storybook-config changes
# where build doesn't run, so it always does its own full build.
#
# Chromatic story-only gap (intentional): Chromatic only runs when CSS
# output changes. New stories added without CSS changes don't get
# baselines set automatically. This is intentional cost management
# given the 5k free tier. Revisit if budget expands.

name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  # -----------------------------------------------------------------------
  # Filter -- determines which jobs run based on what changed
  # -----------------------------------------------------------------------
  filter:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      scss: ${{ steps.filter.outputs.scss }}
      js: ${{ steps.filter.outputs.js }}
      json: ${{ steps.filter.outputs.json }}
      md: ${{ steps.filter.outputs.md }}
      mdx: ${{ steps.filter.outputs.mdx }}
      stories: ${{ steps.filter.outputs.stories }}
      pkg: ${{ steps.filter.outputs.pkg }}
      storybook-config: ${{ steps.filter.outputs.storybook-config }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            scss:
              - 'src/scss/**'
              - 'tokens.json'
            js:
              - '**/*.js'
            json:
              - '**/*.json'
              - '!package-lock.json'
            md:
              - '**/*.md'
            mdx:
              - 'stories/**/*.mdx'
            stories:
              - '**/*.stories.js'
            pkg:
              - 'package.json'
            storybook-config:
              - '.storybook/**'

  # -----------------------------------------------------------------------
  # Lint: lockfile -- always runs (fast, supply chain check)
  # -----------------------------------------------------------------------
  lint-lockfile:
    name: Lint / lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lockfile lint
        run: npm run lint:lockfile

  # -----------------------------------------------------------------------
  # Lint: SCSS -- runs if src/scss or tokens.json changed
  # -----------------------------------------------------------------------
  lint-scss:
    name: Lint / SCSS
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.scss == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stylelint
        run: npm run lint:scss

  # -----------------------------------------------------------------------
  # Lint: JS -- runs if any JS changed (including stories)
  # -----------------------------------------------------------------------
  lint-js:
    name: Lint / JS and JSON
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.js == 'true' || needs.filter.outputs.json == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint:js

  # -----------------------------------------------------------------------
  # Lint: Markdown -- runs if .md files changed
  # -----------------------------------------------------------------------
  lint-md:
    name: Lint / Markdown
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.md == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: remark-lint
        run: npm run lint:md

  # -----------------------------------------------------------------------
  # Lint: MDX -- runs if stories MDX files changed
  # -----------------------------------------------------------------------
  lint-mdx:
    name: Lint / MDX
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.mdx == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: remark-lint MDX
        run: npm run lint:mdx

  # -----------------------------------------------------------------------
  # Lint: Prettier -- runs if any Prettier-covered file type changed
  # -----------------------------------------------------------------------
  lint-format:
    name: Lint / Prettier
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.md == 'true' ||
      needs.filter.outputs.mdx == 'true' ||
      needs.filter.outputs.js == 'true' ||
      needs.filter.outputs.json == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prettier format check
        run: npm run format

  # -----------------------------------------------------------------------
  # Build -- runs if SCSS, tokens, stories, or JS changed.
  # Uploads all of dist/ as a shared artifact so downstream jobs
  # (test, chromatic, bundle-size, css-hash, api-check) can download
  # it instead of rebuilding. See artifact strategy note at top of file.
  # -----------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.scss == 'true' ||
      needs.filter.outputs.stories == 'true' ||
      needs.filter.outputs.js == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 1

  # -----------------------------------------------------------------------
  # Test -- downloads the dist artifact instead of rebuilding.
  # Needs build to complete first since it depends on the artifact.
  # Wall time is similar to before (Playwright install takes ~30s either
  # way) but eliminates a redundant full SCSS compilation.
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [filter, build]
    if: |
      needs.filter.outputs.scss == 'true' ||
      needs.filter.outputs.stories == 'true' ||
      needs.filter.outputs.js == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Unit tests
        run: npx vitest run --project unit --reporter=dot

      - name: A11y tests
        run: npx vitest run --project storybook --reporter=dot

  # -----------------------------------------------------------------------
  # Build Storybook -- verifies the static Storybook build succeeds.
  # Catches MDX parse errors, broken imports, and bad story configs before
  # they reach the GitHub Pages deploy (roadmap §2).
  #
  # Does NOT use the dist artifact because it also triggers on mdx and
  # storybook-config changes where the build job doesn't run. Always
  # does its own full build to guarantee dist/ is available for staticDirs.
  # -----------------------------------------------------------------------
  build-storybook:
    name: Build / Storybook
    runs-on: ubuntu-latest
    needs: filter
    if: |
      needs.filter.outputs.mdx == 'true' ||
      needs.filter.outputs.stories == 'true' ||
      needs.filter.outputs.scss == 'true' ||
      needs.filter.outputs.storybook-config == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS and assets
        run: npm run build

      - name: Build Storybook
        run: npm run build-storybook

  # -----------------------------------------------------------------------
  # Bundle size -- downloads dist artifact, checks CSS file sizes.
  # -----------------------------------------------------------------------
  bundle-size:
    name: Bundle size
    runs-on: ubuntu-latest
    needs: [filter, build]
    if: needs.filter.outputs.scss == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check bundle size
        run: bash scripts/check-bundle-size.sh

  # -----------------------------------------------------------------------
  # CSS hash -- compares compiled output vs. base branch.
  # Base branch is built independently (unavoidable -- no artifact exists
  # for it). PR side downloads the shared dist artifact.
  # -----------------------------------------------------------------------
  css-hash:
    name: Compare CSS hash
    runs-on: ubuntu-latest
    needs: [filter, build]
    if: needs.filter.outputs.scss == 'true'
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.base_ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies (base branch)
        run: npm ci

      - name: Build base branch
        run: npm run build

      - name: Hash base CSS
        id: base-hash
        run: |
          echo "hash=$(sha256sum dist/css/hds.min.css dist/css/hds-uswds.min.css dist/css/hds-dataviz.min.css | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Download PR dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Hash PR CSS
        id: pr-hash
        run: |
          echo "hash=$(sha256sum dist/css/hds.min.css dist/css/hds-uswds.min.css dist/css/hds-dataviz.min.css | sha256sum | cut -d' ' -f1)" >> $GITHUB_OUTPUT

      - name: Compare hashes
        id: compare
        run: |
          if [ "${{ steps.base-hash.outputs.hash }}" = "${{ steps.pr-hash.outputs.hash }}" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "CSS output identical to base branch -- skipping Chromatic"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "CSS output changed -- Chromatic will run"
          fi

  # -----------------------------------------------------------------------
  # Chromatic -- runs only if CSS hash changed vs. base branch.
  # Downloads the dist artifact instead of rebuilding. Already waits for
  # build to complete via the css-hash → build dependency chain.
  # fetch-depth: 0 required for Chromatic's TurboSnap baseline detection.
  # -----------------------------------------------------------------------
  chromatic:
    name: Chromatic visual regression
    runs-on: ubuntu-latest
    needs: css-hash
    if: needs.css-hash.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Run Chromatic
        uses: chromaui/action@v17
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true

  # -----------------------------------------------------------------------
  # API contract check -- downloads dist artifact, verifies public API
  # snapshot is up to date. check:api-snapshot reads from dist/css/.
  # -----------------------------------------------------------------------
  api-check:
    name: Public API contract check
    runs-on: ubuntu-latest
    needs: [filter, build]
    if: needs.filter.outputs.scss == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Check public API snapshot
        run: npm run check:api-snapshot

  # -----------------------------------------------------------------------
  # USWDS integrity -- runs when package.json changes (potential USWDS bump)
  # check:uswds-core  architectural gate: @use 'uswds-core' must emit no CSS
  # check:uswds       component tracker: USWDS Sass source unchanged
  # If either fails, do not merge until resolved per CONTRIBUTING.md.
  # -----------------------------------------------------------------------
  check-uswds:
    name: USWDS integrity
    runs-on: ubuntu-latest
    needs: filter
    if: needs.filter.outputs.pkg == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify uswds-core emits no CSS
        run: npm run check:uswds-core

      - name: Verify USWDS packages unchanged
        run: npm run check:uswds
