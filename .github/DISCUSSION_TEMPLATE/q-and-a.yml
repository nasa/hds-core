title: '[Q&A] '
labels: ['question']
body:
  - type: markdown
    attributes:
      value: |
        ## ❓ HDS Core Question

        Ask anything about using HDS Core in your project. We're here to help!

  - type: textarea
    id: question
    attributes:
      label: 'Your question'
      description: 'Be as specific as you can. Include code snippets, error messages, or config files if relevant.'
      placeholder: "I'm trying to use HDS Core with Vite in a Next.js project..."
    validations:
      required: true
