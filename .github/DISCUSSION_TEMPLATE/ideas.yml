title: "[Idea] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 HDS Core Feature Idea

        Thanks for sharing your idea! HDS Core is the shared design-token and style foundation for NASA's public websites.

        **A quick note:** If your idea is already specced in the HDS Figma library, we just need to build it to match. If it's a net-new design proposal, it will need a quick look from the creative director before we can merge it.
        
  - type: textarea
    id: description
    attributes:
      label: "What's your idea?"
      description: "Describe the new component, token, or feature you'd like to see, and who would benefit from it. Link to prior art or the HDS Figma if you have it!"
    validations:
      required: true
