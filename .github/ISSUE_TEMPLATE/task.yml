name: "✏️ Task / Small Enhancement"
description: >-
  A small, scoped change — adding a missing token, fixing a build config,
  adjusting a style. For big feature ideas, use Discussions → Ideas.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✏️ Task / Small Enhancement

        Use this for focused, well-defined changes — especially
        **implementing something already specced in the HDS Figma
        library** that just hasn't been built into HDS Core yet.

        - **Has a Figma spec?** → Great, this is the right place. File it here.
        - **No Figma spec?** → Consider posting in
          [💡 Ideas](https://github.com/nasa/hds-core/discussions/categories/ideas)
          instead, since new designs need review by the HDS design lead.
        - **Found a bug?** → Use the
          [🐛 Bug Report](https://github.com/nasa/hds-core/issues/new?template=bug-report.yml)
          template instead.

  # ── WHAT NEEDS TO CHANGE ─────────────────────────────────
  - type: textarea
    id: task-description
    attributes:
      label: "What needs to change?"
      description: "Be as specific as possible — file names, token names, expected values."
      placeholder: |
        Add `--hds-border-radius-card` CSS custom property to
        `_hds-tokens.scss`, set to `0.5rem` to match the HDS card
        component spec.
    validations:
      required: true

  - type: dropdown
    id: task-area
    attributes:
      label: "Affected area"
      options:
        - "Design tokens"
        - "Component overrides"
        - "Base styles"
        - "Mixins"
        - "Assets"
        - "Build / tooling"
        - "CSS custom properties"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: task-rationale
    attributes:
      label: "Why is this needed?"
      description: "What use case or project drove this request?"
    validations:
      required: true

  # ── HDS DESIGN STATUS ───────────────────────────────────
  - type: dropdown
    id: figma-status
    attributes:
      label: "Is this specced in the HDS Figma library?"
      description: >-
        Tasks are ideal for building things already designed in HDS Figma.
        If this is a net-new design idea, consider posting in
        Discussions → Ideas instead, since it will need design review.
      options:
        - "✅ Yes — there's an HDS Figma spec to build against"
        - "🟡 Partially — some spec exists, some gaps"
        - "❌ No — I'm proposing a new design"
        - "N/A — this is a tooling/build change, not a design item"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: figma-reference
    attributes:
      label: "Figma reference"
      description: >-
        Link to the HDS Figma frame or page showing the spec.
      placeholder: "https://www.figma.com/file/..."
    validations:
      required: false

  # ── CONTRIBUTION ─────────────────────────────────────────
  - type: dropdown
    id: task-pr
    attributes:
      label: "Can you submit a PR?"
      options:
        - "Yes — I'll submit one"
        - "Maybe — could use guidance on approach"
        - "No — just flagging it"
    validations:
      required: false