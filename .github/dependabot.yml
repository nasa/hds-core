version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '09:00'
      timezone: 'America/New_York'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    groups:
      storybook:
        patterns:
          - '@storybook/*'
          - '@chromatic-com/*'
          - 'storybook'
          - 'storybook-addon-*'
          - 'eslint-plugin-storybook'
      vitest:
        patterns:
          - '@vitest/*'
          - 'vitest'
      postcss:
        patterns:
          - 'postcss'
          - 'postcss-*'
          - 'cssnano'
          - 'autoprefixer'
      remark:
        patterns:
          - 'remark-*'
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-plugin-*'
          - 'globals'
      stylelint:
        patterns:
          - 'stylelint'
          - 'stylelint-*'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'friday'
      time: '09:00'
      timezone: 'America/New_York'
    labels:
      - 'dependencies'
      - 'github-actions'
    groups:
      actions:
        patterns:
          - '*'
